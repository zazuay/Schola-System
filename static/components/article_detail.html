<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schola - Resource Detail</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/variables.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'css/myapp.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <style>
        /* PERBAIKAN DI BAGIAN INI AGAR SINKRON DAN PRESISI */
        .article-wrapper {
            display: block !important;
            width: 100%;
            max-width: var(--container-max-width);
            margin: 0 auto;
            margin-top: 80px !important; /* Pendorong utama agar lolos dari fixed navbar */
            padding: 60px 24px 80px 24px !important; /* Menggunakan total padding atas 60px (+80px margin = 140px total ruang bebas) */
            min-height: calc(100vh - 250px);
            box-sizing: border-box;
        }

        .back-btn-container {
            margin-bottom: 32px;
            text-align: left;
            width: 100%;
        }

        .btn-back-resource {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--color-navy);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-normal);
            text-decoration: none;
            transition: transform var(--transition-fast), color var(--transition-fast);
        }

        .btn-back-resource:hover {
            transform: translateX(-6px);
            color: var(--color-blue-primary);
        }

        .article-card {
            background: var(--color-bg-card);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(47, 58, 85, 0.05);
        }

        .article-category-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-size: var(--font-size-tag);
            font-weight: var(--font-weight-bold);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
            background-color: var(--color-sky-blue);
            color: var(--color-navy);
        }

        .article-title {
            font-size: var(--font-size-sub-judul);
            font-weight: var(--font-weight-bold);
            color: var(--color-navy);
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: var(--font-size-keterangan);
            color: var(--color-text-nav-no-hover);
            border-bottom: 1px solid #F1F5F9;
            padding-bottom: 24px;
            margin-bottom: 32px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .article-body-content {
            font-size: var(--font-size-normal);
            color: var(--color-text-black);
            line-height: 1.7;
        }

        .article-body-content p {
            margin-bottom: 20px;
        }

        .article-body-content h3 {
            font-size: var(--font-size-normal);
            font-weight: var(--font-weight-bold);
            color: var(--color-navy);
            margin: 32px 0 12px 0;
        }

        .faq-block-item {
            background-color: #F8FAFC;
            border: 1px solid rgba(88, 151, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .faq-block-number {
            display: inline-block;
            font-size: var(--font-size-tag);
            font-weight: var(--font-weight-bold);
            color: var(--color-blue-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .faq-block-q {
            font-size: var(--font-size-normal);
            font-weight: var(--font-weight-bold);
            color: var(--color-navy);
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        .faq-block-a {
            font-size: var(--font-size-keterangan);
            color: var(--color-text-nav-no-hover);
            margin: 0;
            line-height: 1.6;
        }

        .resource-download-box {
            background-color: var(--color-sky-blue);
            border-left: 4px solid var(--color-blue-primary);
            padding: 24px;
            border-radius: 0 24px 24px 0;
            margin: 32px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .download-info h4 {
            font-size: var(--font-size-normal);
            font-weight: var(--font-weight-bold);
            color: var(--color-navy);
            margin-bottom: 4px;
        }

        .download-info p {
            margin: 0;
            font-size: var(--font-size-keterangan);
            color: var(--color-text-nav-no-hover);
        }

        .btn-template-download {
            background-color: var(--color-navy);
            color: var(--color-text-light);
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-keterangan);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-fast);
            cursor: pointer;
            border: none;
        }

        .btn-template-download:hover {
            background-color: var(--color-blue-primary);
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .article-wrapper {
                padding-top: 40px !important;
            }
            .article-card {
                padding: 24px;
                border-radius: 20px;
            }
            .article-title {
                font-size: 1.75rem;
            }
            .resource-download-box {
                flex-direction: column;
                align-items: flex-start;
                border-radius: 16px;
                border-left: none;
                border-top: 4px solid var(--color-blue-primary);
            }
            .btn-template-download {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar-placeholder"></div>
    <div id="navbar-placeholder"></div>

    <main class="article-wrapper reveal-load">
        <div class="back-btn-container">
            <a href="student_resources.html" class="btn-back-resource">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Learning Resources
            </a>
        </div>

        <article class="article-card">
            <div id="dynamic-badge" class="article-category-badge">Category</div>
            
            <h1 id="dynamic-title" class="article-title">Loading Article...</h1>
            
            <div class="article-meta">
                <div class="meta-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    <span id="dynamic-date">May 30, 2026</span>
                </div>
                <div class="meta-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span id="dynamic-author">By Schola Team</span>
                </div>
            </div>

            <div id="dynamic-body" class="article-body-content">
                <p>Loading document content...</p>
            </div>
        </article>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        function loadResourceDetailComponent(id, url) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP failure: ' + response.status);
                    return response.text();
                })
                .then(data => {
                    document.getElementById(id).innerHTML = data;
                    
                    let verifyElementsExist = setInterval(() => {
                        const iconButtons = document.querySelectorAll('.nav-icon-btn');
                        const items = document.querySelectorAll('.nav-link, .sidebar-link, .logo, .navbar-brand, .logo-container a');
                        
                        if (iconButtons.length >= 2 && items.length > 0) {
                            clearInterval(verifyElementsExist);

                            iconButtons[0].setAttribute('onclick', "window.location.href='notifications.html'");
                            iconButtons[1].setAttribute('onclick', "window.location.href='student_profile.html'");

                            items.forEach(link => {
                                const linkText = link.textContent.trim().toLowerCase();
                                
                                if (
                                    link.innerHTML.includes('img') ||
                                    link.classList.contains('logo') ||
                                    link.classList.contains('sidebar-logo') ||
                                    linkText === ''
                                ) {
                                    link.setAttribute('href', '../index.html');
                                    link.classList.remove('active');
                                }

                                if (linkText.includes('resource')) {
                                    link.setAttribute('href', 'student_resources.html');
                                    link.classList.add('active');
                                } else if (linkText.includes('scholarship')) {
                                    link.setAttribute('href', '../index.html');
                                    link.classList.remove('active');
                                } else if (linkText.includes('application') || linkText.includes('my app')) {
                                    link.setAttribute('href', 'student_myapplications.html');
                                    link.classList.remove('active');
                                } else if (linkText.includes('notification')) {
                                    link.setAttribute('href', 'notifications.html');
                                    link.classList.remove('active');
                                } else if (linkText.includes('profile')) {
                                    link.setAttribute('href', 'student_profile.html');
                                    link.classList.remove('active');
                                } else if (linkText.includes('saved')) {
                                    link.setAttribute('href', 'student_saved.html');
                                    link.classList.remove('active');
                                }
                            });
                        }
                    }, 30);
                })
                .catch(err => console.error(err));
        }

        loadResourceDetailComponent('sidebar-placeholder', 'student_sidebar.html');
        loadResourceDetailComponent('navbar-placeholder', 'student_navbar.html');
        loadResourceDetailComponent('footer-placeholder', 'student_footer.html');
    </script>
    <script src="{% static 'js/navbar.js' %}"></script>

    <script>
        const contentDatabase = {
            guides: {

                date: 'May 28, 2026',
                author: 'By Sarah Jenkins, Academic Counselor',
                body: `

                    <p>Start with an engaging introduction. Briefly explain your background and why this specific study program and scholarship align perfectly with your future vision.</p>
                    <h3>2. Demonstrate Clear Contributions</h3>
                    <p>Do not just focus on what you hope to gain from the scholarship. Explicitly explain the concrete contributions you will bring back to the community or your country after completing your studies.</p>
                    <p>Utilize the STAR method (Situation, Task, Action, Result) when describing your organizational or leadership experiences to keep your narrative structured and impactful.</p>
                `
            },

            },
            stories: {
                badgeText: 'Success Stories',
                title: 'Journey to Oxford: Overcoming Constraints and Achieving Dreams',

                author: 'By David Cho, Alumnus 2025',

            webinars: {

            },
            advisor: {

                        </div>

                            Talk to Advisor

                    </div>
                    <h3>Preparation Indicators</h3>
                    <p>Please ensure all digital copies of academic records, draft portfolios, and resume outlines are uploaded into your Schola Document Registry beforehand to maximize evaluation efficiency.</p>
                `
            },
            "live-daad": {
                badgeText: 'Live Webinar',
                title: 'Mastering the DAAD Application Framework',
                date: 'May 24, 2026',
                author: 'By Dr. Ellen Ross, DAAD Alumna',
                body: `

                    <div class="resource-download-box">
                        <div class="download-info">
                            <h4>Live Session Broadcast Portal</h4>

                        </div>
                        <button class="btn-template-download" onclick="alert('Registration Successful!')">

            "live-financial": {

                author: 'By Prof. Alan Vance',
                body: `
                    <p>Engineering and computer science majors face specific portfolio selection criteria. This webinar highlights premium global grant pipelines that completely cover non-tuition costs and research allowances.</p>
                    
                    <div class="resource-download-box">
                        <div class="download-info">
                            <h4>Live Session Broadcast Portal</h4>
                            <p>Schedule: June 12 • 10:00 EST • Engineering Tracks</p>
                        </div>
                        <button class="btn-template-download" onclick="alert('Registration Successful!')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>

        const urlParams = new URLSearchParams(window.location.search);
        const currentCategory = urlParams.get('category') || 'guides'; 

        const selectedContent = contentDatabase[currentCategory];

        if (selectedContent) {
            const badgeElement = document.getElementById('dynamic-badge');
            badgeElement.innerText = selectedContent.badgeText;
            
            document.getElementById('dynamic-title').innerText = selectedContent.title;
            document.getElementById('dynamic-date').innerText = selectedContent.date;
            document.getElementById('dynamic-author').innerText = selectedContent.author;
            document.getElementById('dynamic-body').innerHTML = selectedContent.body;
            document.title = `Schola - ${selectedContent.title}`;
        }
    </script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.reveal-load').forEach(element => element.classList.add('revealed'));
        });
    </script>
</body>
</html>
