<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="sidebar-close" id="sidebarClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5897FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <div class="sidebar-content">
        <div class="sidebar-brand-group">
            <a href="index.html" class="sidebar-logo" id="sidebarLogo">
                <img src="{% static 'assets/logo.png" alt="Schola Logo">
            </a>
        </div>

        <nav class="sidebar-nav">
            <a href="components/student_myapplications.html" class="sidebar-link">My Applications</a>
            <a href="components/student_resources.html" class="sidebar-link">Resources</a>
            <a href="components/notifications.html" class="sidebar-link">Notification</a>
            <a href="components/student_profile.html" class="sidebar-link">Profile</a>
            <a href="components/student_saved.html" class="sidebar-link">Saved</a>
        </nav>
    </div>

    <div class="sidebar-footer">
        <a href="index.html" class="btn-find-scholarships">Find Scholarships</a>
    </div>
</aside>

<script>
(function () {

    function initSidebarActiveLogic() {
        const currentPath = window.location.pathname.split("/").pop();
        const logoElement = document.getElementById("sidebarLogo");
        const sidebarLinks = document.querySelectorAll(".sidebar-link");

        logoElement.classList.remove("active");

        sidebarLinks.forEach(link => {
            link.classList.remove("active");
        });

        if (
            currentPath === "index.html" ||
            currentPath === "student_dashboard1.html" ||
            currentPath === ""
        ) {
            logoElement.classList.add("active");
        }

        sidebarLinks.forEach(link => {
            const linkHref = link.getAttribute("href");

            if (!linkHref) return;

            const linkFile = linkHref.split("/").pop();

            if (currentPath === linkFile && currentPath !== "") {
                link.classList.add("active");
                logoElement.classList.remove("active");
            }
        });
    }

    function initSidebarHoverLogic() {
        const logo = document.getElementById("sidebarLogo");
        const links = document.querySelectorAll(".sidebar-link");

        links.forEach(link => {

            link.addEventListener("mouseenter", () => {
                if (logo.classList.contains("active")) {
                    logo.classList.add("hover-hidden");
                }
            });

            link.addEventListener("mouseleave", () => {
                logo.classList.remove("hover-hidden");
            });

        });
    }

    function initializeSidebar() {
        initSidebarActiveLogic();
        initSidebarHoverLogic();
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(initializeSidebar, 100);
        });
    } else {
        setTimeout(initializeSidebar, 100);
    }

})();
</script>
